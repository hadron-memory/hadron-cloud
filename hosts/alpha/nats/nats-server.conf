# /etc/nats-server.conf on alpha (Debian package, runs as user "nats")
#
# Binds 0.0.0.0 because NATS can't bind multiple specific IPs and the
# containers connect via the Docker gateway addresses. The Hetzner
# cloud firewall does not open 4222, so nothing external can reach it
# (same posture as MongoDB on this host).
#
# Logs go to journald: journalctl -u nats-server

listen: 0.0.0.0:4222
server_name: alpha

# Monitoring (http://127.0.0.1:8222/varz etc.) — localhost only.
http: 127.0.0.1:8222

# JetStream (persistence) — on, modest caps for a shared host.
# /var/lib/nats must be owned by nats:nats.
jetstream {
  store_dir: /var/lib/nats
  max_memory_store: 512MB
  max_file_store: 10GB
}
