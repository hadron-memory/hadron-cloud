# /etc/systemd/system/redis-server.service.d/wait-for-docker.conf
# Redis binds the Docker gateway IPs; without this ordering it can start
# before the bridges exist and silently fall back to localhost-only
# (same failure mode Postgres hit — see /root/komodo/setup.md gotcha 8).
[Unit]
After=docker.service
Wants=docker.service
